<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>教師甄試學習系統 — 知識圖譜 × 間隔複習</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <h1>教師甄試學習系統</h1>
      <p class="tagline">教育專業科目 · 知識圖譜 × 艾賓浩斯間隔複習 · 內建教檢＋教甄歷屆考古題</p>
    </div>
    <div class="header-progress" id="header-progress" aria-label="整體掌握進度"></div>
  </header>

  <nav class="tabs" id="tabs" role="tablist">
    <button class="tab" data-view="dashboard" role="tab">總覽</button>
    <button class="tab" data-view="graph" role="tab">知識圖譜</button>
    <button class="tab" data-view="review" role="tab">複習佇列</button>
    <button class="tab" data-view="settings" role="tab">設定</button>
  </nav>

  <main class="views">
    <section class="view" id="view-dashboard" role="tabpanel"></section>
    <section class="view" id="view-graph" role="tabpanel">
      <div class="graph-toolbar">
        <div class="legend" id="graph-legend"></div>
        <p class="hint">點擊任一節點開始學習；節點顏色代表掌握狀態。</p>
      </div>
      <div class="graph-canvas" id="graph-canvas"></div>
    </section>
    <section class="view" id="view-review" role="tabpanel"></section>
    <section class="view" id="view-settings" role="tabpanel"></section>
  </main>

  <!-- 節點課程 + 測驗彈窗 -->
  <div class="modal-backdrop" id="modal" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <button class="modal-close" id="modal-close" aria-label="關閉">×</button>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <input type="file" id="import-file" accept="application/json" hidden>

  <script src="js/data.js"></script>
  <script src="js/srs.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/graph.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
